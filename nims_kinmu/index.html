<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIMSジュニア勤務表ジェネレータ</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    margin: 0;
    padding: 12px;
    background: #f5f5f7;
    color: #1d1d1f;
    font-size: 14px;
  }
  header {
    background: white;
    padding: 14px 16px;
    border-radius: 12px;
    margin-bottom: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: sticky;
    top: 8px;
    z-index: 100;
  }
  h1 { font-size: 17px; margin: 0 0 10px 0; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 10px 16px; align-items: center;
  }
  .control-group {
    display: flex; align-items: center; gap: 6px;
  }
  label { font-weight: 600; font-size: 13px; }
  select, input[type="number"] {
    padding: 6px 8px; border: 1px solid #d1d1d6; border-radius: 6px;
    font-size: 14px; background: white;
  }
  button {
    padding: 6px 12px; border: 1px solid #007aff; background: #007aff;
    color: white; border-radius: 6px; cursor: pointer; font-size: 13px;
    font-family: inherit;
  }
  button:hover { background: #005ec4; }
  button.secondary { background: white; color: #007aff; }
  button.secondary:hover { background: #f0f7ff; }
  .weekday-picker { display: flex; gap: 4px; }
  .weekday-btn {
    width: 34px; height: 34px; padding: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px; border: 1px solid #d1d1d6;
    background: white; cursor: pointer; font-size: 13px;
    color: #333;
  }
  .weekday-btn[data-day="0"] { color: #d70015; }
  .weekday-btn[data-day="6"] { color: #007aff; }
  .weekday-btn.selected {
    background: #007aff !important; color: white !important; border-color: #007aff;
  }
  .summary {
    padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 13px;
    background: #f0f9ff;
  }
  .summary.ok { background: #d4f8d4; color: #155724; }
  .summary.warn { background: #fff3cd; color: #856404; }
  .summary.error { background: #f8d7da; color: #721c24; }
  .legend {
    display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px;
    font-size: 12px; padding: 8px 12px; background: #fafafa;
    border-radius: 6px; color: #555;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-swatch {
    width: 14px; height: 14px; border-radius: 3px; border: 1px solid #ddd;
  }
  main {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 10px;
  }
  .month {
    background: white; border-radius: 10px; padding: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .month-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .month-name { font-size: 15px; font-weight: 700; }
  .month-count {
    font-size: 12px; padding: 2px 8px; border-radius: 10px;
    background: #f5f5f7; font-weight: 600;
  }
  .month-count.ok { background: #d4f8d4; color: #155724; }
  .month-count.warn { background: #fff3cd; color: #856404; }
  .month-count.error { background: #f8d7da; color: #721c24; }
  .calendar {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px;
  }
  .cal-header {
    text-align: center; font-size: 11px; font-weight: 600;
    padding: 3px 0; color: #666;
  }
  .cal-header.sun { color: #d70015; }
  .cal-header.sat { color: #007aff; }
  .day {
    aspect-ratio: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer;
    font-size: 12px; position: relative;
    background: white; border: 1px solid #eee;
    user-select: none;
    transition: transform 0.05s;
  }
  .day:hover:not(.empty) { transform: scale(1.05); z-index: 1; }
  .day.empty {
    background: transparent; border: none; cursor: default;
  }
  .day.adjustment { background: #fff8e1; border-color: #f7e6a2; }
  .day.obon { background: #f3e5f5; border-color: #d1a3d9; }
  .day.work {
    background: #007aff; color: white; border-color: #007aff;
  }
  .day.weekend-sun { color: #d70015; }
  .day.weekend-sat { color: #007aff; }
  .day.holiday { color: #d70015; }
  .day.obon:not(.work) { color: #6a1b9a; }
  .day.work .day-num,
  .day.work .day-label { color: white; }
  .day.violation { box-shadow: inset 0 0 0 2px #d70015; }
  .day.violation::after {
    content: "!"; position: absolute; top: -2px; right: 3px;
    color: #d70015; font-weight: 700; font-size: 11px;
    background: white; border-radius: 50%;
    width: 12px; height: 12px;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .day-num { font-weight: 600; font-size: 13px; line-height: 1; }
  .day-label {
    font-size: 8px; text-align: center; line-height: 1.1;
    max-width: 95%; overflow: hidden; white-space: nowrap;
    text-overflow: ellipsis; margin-top: 1px;
    color: inherit;
  }
  .hint {
    font-size: 12px; color: #666; margin-top: 6px;
  }
  .lang-switch {
    position: absolute; top: 14px; right: 16px;
    display: flex; gap: 4px;
  }
  .lang-btn {
    text-decoration: none; padding: 3px 8px; border-radius: 4px;
    background: #f5f5f7; color: #333; font-size: 12px;
    border: 1px solid #d1d1d6;
  }
  .lang-btn.active { background: #007aff; color: white; border-color: #007aff; }
  h1 { padding-right: 140px; }
  @media (max-width: 640px) {
    body { padding: 6px; font-size: 13px; }
    header { position: static; padding: 12px; }
    .controls { gap: 8px 12px; }
    main { grid-template-columns: 1fr; }
    .month { padding: 8px; }
  }
</style>
</head>
<body>
<header style="position:relative">
  <div class="lang-switch">
    <a href="index.html" class="lang-btn active">JA</a>
    <a href="index_en.html" class="lang-btn">EN</a>
  </div>
  <h1>NIMSジュニア勤務表ジェネレータ</h1>
  <div class="controls">
    <div class="control-group">
      <label>プログラム</label>
      <select id="program">
        <option value="master">Master (月11日 / 年132日)</option>
        <option value="doctor">Doctor (月14日 / 年168日)</option>
      </select>
    </div>
    <div class="control-group">
      <label>開始</label>
      <select id="startYear"></select>
      <label>年</label>
      <select id="startMonth"></select>
    </div>
    <div class="control-group">
      <label>週パターン</label>
      <div class="weekday-picker" id="patternPicker">
        <button class="weekday-btn" data-day="0">日</button>
        <button class="weekday-btn" data-day="1">月</button>
        <button class="weekday-btn" data-day="2">火</button>
        <button class="weekday-btn" data-day="3">水</button>
        <button class="weekday-btn" data-day="4">木</button>
        <button class="weekday-btn" data-day="5">金</button>
        <button class="weekday-btn" data-day="6">土</button>
      </div>
    </div>
    <div class="control-group">
      <button id="resetBtn" class="secondary">編集リセット</button>
      <button id="exportBtn">CSV出力</button>
    </div>
    <div class="summary" id="annualSummary">年間: 0/0日</div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:#007aff"></div>勤務日</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fff8e1"></div>調整期間</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#f3e5f5"></div>夏季休暇(お盆)</div>
    <div class="legend-item"><div class="legend-swatch" style="background:white"></div>非勤務日</div>
    <div class="legend-item"><span style="color:#d70015;font-weight:700">!</span> 週3日ルール違反</div>
  </div>
  <div class="hint">全期間にベースの週パターンが適用されます。日付クリックで勤務/非勤務を切替。調整期間・夏季休暇は違反警告なしで自由に調整可。</div>
</header>
<main id="calendars"></main>

<script>
'use strict';

const ADJUSTMENT_MONTHS = [2, 3, 8, 9];
const BUFFER_DAYS = 7;
const TARGETS = {
  master: { monthly: 11, annual: 132 },
  doctor: { monthly: 14, annual: 168 },
};
const WEEKDAY_LABELS = ['日', '月', '火', '水', '木', '金', '土'];
const STORAGE_KEY = 'nims_kinmu_v1';

let state = {
  program: 'master',
  startYear: 2026,
  startMonth: 4,
  pattern: [1, 3, 5],
  overrides: {},
};

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (s) state = Object.assign(state, JSON.parse(s));
  } catch(e) {}
}

const pad = n => String(n).padStart(2, '0');
const dateKey = (y, m, d) => `${y}-${pad(m)}-${pad(d)}`;
const daysInMonth = (y, m) => new Date(y, m, 0).getDate();

function nthWeekdayDay(year, month, weekday, n) {
  const first = new Date(year, month - 1, 1);
  const firstWd = first.getDay();
  return 1 + ((weekday - firstWd + 7) % 7) + (n - 1) * 7;
}
function equinox(year, spring) {
  const d = year - 1980;
  const base = spring ? 20.8431 : 23.2488;
  return Math.floor(base + 0.242194 * d - Math.floor(d / 4));
}
function getHolidays(year) {
  const h = {};
  const add = (m, d, name) => h[dateKey(year, m, d)] = name;
  add(1, 1, '元日');
  add(2, 11, '建国記念の日');
  add(2, 23, '天皇誕生日');
  add(4, 29, '昭和の日');
  add(5, 3, '憲法記念日');
  add(5, 4, 'みどりの日');
  add(5, 5, 'こどもの日');
  add(8, 11, '山の日');
  add(11, 3, '文化の日');
  add(11, 23, '勤労感謝の日');
  add(1, nthWeekdayDay(year, 1, 1, 2), '成人の日');
  add(7, nthWeekdayDay(year, 7, 1, 3), '海の日');
  add(9, nthWeekdayDay(year, 9, 1, 3), '敬老の日');
  add(10, nthWeekdayDay(year, 10, 1, 2), 'スポーツの日');
  add(3, equinox(year, true), '春分の日');
  add(9, equinox(year, false), '秋分の日');
  // 振替休日: 日曜が祝日なら翌平日を振替
  const orig = Object.assign({}, h);
  for (const key of Object.keys(orig)) {
    const [y, m, d] = key.split('-').map(Number);
    const date = new Date(y, m - 1, d);
    if (date.getDay() === 0) {
      let next = new Date(date);
      do {
        next.setDate(next.getDate() + 1);
      } while (h[dateKey(next.getFullYear(), next.getMonth() + 1, next.getDate())]);
      h[dateKey(next.getFullYear(), next.getMonth() + 1, next.getDate())] = '振替休日';
    }
  }
  return h;
}
let holidayCache = {};
function isHoliday(y, m, d) {
  if (!holidayCache[y]) holidayCache[y] = getHolidays(y);
  return holidayCache[y][dateKey(y, m, d)];
}

function isAdjustmentDay(y, m, d) {
  if (ADJUSTMENT_MONTHS.includes(m)) return true;
  const base = new Date(y, m - 1, d);
  for (let offset = -BUFFER_DAYS; offset <= BUFFER_DAYS; offset++) {
    const c = new Date(base);
    c.setDate(c.getDate() + offset);
    if (ADJUSTMENT_MONTHS.includes(c.getMonth() + 1)) return true;
  }
  return false;
}

// NIMS推奨夏季休暇: 8/13〜8/16をコアに、週末と祝日を除外して平日4日を確保
// 4日に満たなければAug 12から逆順に平日を追加
function getObonDays(year) {
  const isCandidate = d => {
    const date = new Date(year, 7, d);
    const wd = date.getDay();
    if (wd === 0 || wd === 6) return false;
    if (isHoliday(year, 8, d)) return false;
    return true;
  };
  const days = [];
  for (let d = 13; d <= 16; d++) {
    if (isCandidate(d)) days.push(d);
  }
  let cur = 12;
  while (days.length < 4 && cur >= 1) {
    if (isCandidate(cur)) days.unshift(cur);
    cur--;
  }
  return days.sort((a, b) => a - b);
}
const obonCache = {};
function isObon(y, m, d) {
  if (m !== 8) return false;
  if (!obonCache[y]) obonCache[y] = new Set(getObonDays(y));
  return obonCache[y].has(d);
}

function isDefaultWork(y, m, d) {
  const date = new Date(y, m - 1, d);
  const wd = date.getDay();
  if (isHoliday(y, m, d)) return false;
  if (isObon(y, m, d)) return false;
  return state.pattern.includes(wd);
}
function isWorkDay(y, m, d) {
  const key = dateKey(y, m, d);
  if (key in state.overrides) return state.overrides[key];
  return isDefaultWork(y, m, d);
}

// 「任意の連続7日で ちょうど3日勤務」チェック
// 判定対象: 7日全てが (非調整期間 かつ 祝日/夏季休暇を含まない) 窓
// 祝日で自然に週3日ルールが崩れるケースは意図通りなので違反扱いにしない
function checkViolation(y, m, d) {
  const base = new Date(y, m - 1, d);
  for (let startOffset = -6; startOffset <= 0; startOffset++) {
    const start = new Date(base);
    start.setDate(start.getDate() + startOffset);
    let checkable = true;
    let count = 0;
    for (let i = 0; i < 7; i++) {
      const c = new Date(start);
      c.setDate(c.getDate() + i);
      const cy = c.getFullYear(), cm = c.getMonth() + 1, cd = c.getDate();
      if (isAdjustmentDay(cy, cm, cd) || isHoliday(cy, cm, cd) || isObon(cy, cm, cd)) {
        checkable = false; break;
      }
      if (isWorkDay(cy, cm, cd)) count++;
    }
    if (checkable && count !== 3) return true;
  }
  return false;
}

function iterateMonths(cb) {
  for (let i = 0; i < 12; i++) {
    let y = state.startYear;
    let m = state.startMonth + i;
    while (m > 12) { m -= 12; y++; }
    cb(y, m, i);
  }
}

function render() {
  updateControls();
  renderCalendars();
  updateAnnualSummary();
  saveState();
}

function updateControls() {
  document.getElementById('program').value = state.program;
  document.getElementById('startYear').value = state.startYear;
  document.getElementById('startMonth').value = state.startMonth;
  document.querySelectorAll('.weekday-btn').forEach(btn => {
    const d = Number(btn.dataset.day);
    btn.classList.toggle('selected', state.pattern.includes(d));
  });
}

function renderCalendars() {
  holidayCache = {};
  for (const k in obonCache) delete obonCache[k];
  const container = document.getElementById('calendars');
  container.innerHTML = '';
  const target = TARGETS[state.program];

  iterateMonths((y, m) => {
    const monthDiv = document.createElement('div');
    monthDiv.className = 'month';
    const dim = daysInMonth(y, m);
    let count = 0;
    for (let d = 1; d <= dim; d++) {
      if (isWorkDay(y, m, d)) count++;
    }
    let countClass = 'ok';
    const diff = Math.abs(count - target.monthly);
    if (diff === 0) countClass = 'ok';
    else if (diff <= 2) countClass = 'warn';
    else countClass = 'error';

    const header = document.createElement('div');
    header.className = 'month-header';
    header.innerHTML = `<div class="month-name">${y}年 ${m}月</div>
      <div class="month-count ${countClass}">${count} / ${target.monthly}日</div>`;
    monthDiv.appendChild(header);

    const cal = document.createElement('div');
    cal.className = 'calendar';
    for (let wd = 0; wd < 7; wd++) {
      const h = document.createElement('div');
      h.className = 'cal-header';
      if (wd === 0) h.classList.add('sun');
      if (wd === 6) h.classList.add('sat');
      h.textContent = WEEKDAY_LABELS[wd];
      cal.appendChild(h);
    }
    const first = new Date(y, m - 1, 1);
    for (let i = 0; i < first.getDay(); i++) {
      const empty = document.createElement('div');
      empty.className = 'day empty';
      cal.appendChild(empty);
    }
    for (let d = 1; d <= dim; d++) {
      const date = new Date(y, m - 1, d);
      const wd = date.getDay();
      const holiday = isHoliday(y, m, d);
      const adj = isAdjustmentDay(y, m, d);
      const obon = isObon(y, m, d);
      const work = isWorkDay(y, m, d);
      const violation = checkViolation(y, m, d);

      const cell = document.createElement('div');
      cell.className = 'day';
      if (adj) cell.classList.add('adjustment');
      if (obon) cell.classList.add('obon');
      if (work) cell.classList.add('work');
      if (holiday) cell.classList.add('holiday');
      if (wd === 0) cell.classList.add('weekend-sun');
      if (wd === 6) cell.classList.add('weekend-sat');
      if (violation) cell.classList.add('violation');

      const num = document.createElement('div');
      num.className = 'day-num';
      num.textContent = d;
      cell.appendChild(num);
      const labelText = holiday || (obon ? '夏季休暇' : '');
      if (labelText) {
        const lbl = document.createElement('div');
        lbl.className = 'day-label';
        lbl.textContent = labelText;
        cell.appendChild(lbl);
      }
      cell.title = `${dateKey(y, m, d)} (${WEEKDAY_LABELS[wd]})` +
        (holiday ? ` - ${holiday}` : '') +
        (obon ? ' - 夏季休暇' : '') +
        (adj ? ' [調整期間]' : '') +
        (work ? ' [勤務]' : '') +
        (violation ? ' [週3日ルール違反]' : '');
      cell.addEventListener('click', () => toggleDay(y, m, d));
      cal.appendChild(cell);
    }
    monthDiv.appendChild(cal);
    container.appendChild(monthDiv);
  });
}

function toggleDay(y, m, d) {
  const key = dateKey(y, m, d);
  const current = isWorkDay(y, m, d);
  const isDef = isDefaultWork(y, m, d);
  const newVal = !current;
  if (newVal === isDef) delete state.overrides[key];
  else state.overrides[key] = newVal;
  render();
}

function updateAnnualSummary() {
  const target = TARGETS[state.program];
  let count = 0, adjCount = 0, nonAdjCount = 0;
  iterateMonths((y, m) => {
    const dim = daysInMonth(y, m);
    for (let d = 1; d <= dim; d++) {
      if (isWorkDay(y, m, d)) {
        count++;
        if (isAdjustmentDay(y, m, d)) adjCount++;
        else nonAdjCount++;
      }
    }
  });
  const el = document.getElementById('annualSummary');
  const diff = count - target.annual;
  const sign = diff > 0 ? '+' : '';
  el.textContent = `年間 ${count}/${target.annual}日 (${sign}${diff}) 非調整${nonAdjCount} / 調整${adjCount}`;
  el.className = 'summary';
  if (diff === 0) el.classList.add('ok');
  else if (Math.abs(diff) <= 3) el.classList.add('warn');
  else el.classList.add('error');
}

function exportCSV() {
  const rows = [['日付', '曜日', '勤務', '調整期間', '祝日/備考']];
  iterateMonths((y, m) => {
    const dim = daysInMonth(y, m);
    for (let d = 1; d <= dim; d++) {
      const date = new Date(y, m - 1, d);
      const wd = WEEKDAY_LABELS[date.getDay()];
      const work = isWorkDay(y, m, d);
      const adj = isAdjustmentDay(y, m, d);
      const note = isHoliday(y, m, d) || (isObon(y, m, d) ? '夏季休暇' : '');
      rows.push([dateKey(y, m, d), wd, work ? '○' : '', adj ? '○' : '', note]);
    }
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `nims_kinmu_${state.startYear}-${pad(state.startMonth)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function initEvents() {
  document.getElementById('program').addEventListener('change', e => {
    state.program = e.target.value;
    render();
  });
  const ySel = document.getElementById('startYear');
  for (let y = 2024; y <= 2035; y++) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y;
    ySel.appendChild(opt);
  }
  ySel.addEventListener('change', e => {
    state.startYear = Number(e.target.value);
    render();
  });
  const mSel = document.getElementById('startMonth');
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m + '月';
    mSel.appendChild(opt);
  }
  mSel.addEventListener('change', e => {
    state.startMonth = Number(e.target.value);
    render();
  });
  document.querySelectorAll('.weekday-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const d = Number(btn.dataset.day);
      const idx = state.pattern.indexOf(d);
      if (idx >= 0) {
        state.pattern.splice(idx, 1);
      } else {
        if (state.pattern.length >= 3) state.pattern.shift();
        state.pattern.push(d);
      }
      state.pattern.sort((a, b) => a - b);
      render();
    });
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('手動編集を全てリセットして初期パターンに戻しますか？')) {
      state.overrides = {};
      render();
    }
  });
  document.getElementById('exportBtn').addEventListener('click', exportCSV);
}

loadState();
initEvents();
render();
</script>
</body>
</html>
